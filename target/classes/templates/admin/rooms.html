<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rooms - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">Hostel Management - Admin</div>
    <ul class="navbar-nav">
        <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/admin/users}">Users</a></li>
        <li><a th:href="@{/admin/rooms}">Rooms</a></li>
        <li><a th:href="@{/admin/payments}">Payments</a></li>
        <li>
            <form action="/auth/logout" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<div class="container">
    <h2>Room Management</h2>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card mb-4">
        <div class="card-header"><h4>Add New Room</h4></div>
        <div class="card-body">
            <form action="/admin/rooms/add" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-row">
                    <div class="form-group col">
                        <label>Room Number</label>
                        <input type="text" name="roomNumber" class="form-control" required/>
                    </div>
                    <div class="form-group col">
                        <label>Room Type</label>
                        <select name="roomType" class="form-control">
                            <option value="SINGLE">Single</option>
                            <option value="DOUBLE">Double</option>
                            <option value="TRIPLE">Triple</option>
                            <option value="DORMITORY">Dormitory</option>
                        </select>
                    </div>
                    <div class="form-group col">
                        <label>Capacity</label>
                        <input type="number" name="capacity" class="form-control" min="1" required/>
                    </div>
                    <div class="form-group col">
                        <label>Price/Year (Rs.)</label>
                        <input type="number" name="pricePerMonth" class="form-control" step="0.01" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" class="form-control"/>
                </div>
                <button type="submit" class="btn btn-primary">Add Room</button>
            </form>
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>Room No</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Occupancy</th>
            <th>Price/Year</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="room : ${rooms}">
            <td th:text="${room.roomNumber}"></td>
            <td th:text="${room.roomType}"></td>
            <td th:text="${room.capacity}"></td>
            <td th:text="${room.currentOccupancy}"></td>
            <td th:text="'Rs. ' + ${room.pricePerMonth}"></td>
            <td th:text="${room.status}"></td>
            <td>
                <form th:action="@{/admin/rooms/delete/{id}(id=${room.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete room?')">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(rooms)}">
            <td colspan="7" class="text-center">No rooms added yet.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
