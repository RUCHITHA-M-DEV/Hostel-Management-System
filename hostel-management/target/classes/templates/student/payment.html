<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments - Hostel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">Hostel Management</div>
    <ul class="navbar-nav">
        <li><a th:href="@{/student/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/student/rooms}">Rooms</a></li>
        <li><a th:href="@{/student/complaints}">Complaints</a></li>
        <li><a th:href="@{/student/payment}">Payments</a></li>
        <li>
            <form action="/auth/logout" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<div class="container">
    <h2>My Payments</h2>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="stat-card mb-4">
        <h4>Total Pending Amount</h4>
        <p class="stat-number" th:text="'Rs. ' + ${pendingAmount}"></p>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Paid On</th>
                <th>Transaction ID</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.paymentType}"></td>
                <td th:text="'Rs. ' + ${payment.amount}"></td>
                <td th:text="${payment.dueDate}"></td>
                <td><span th:class="'badge badge-' + ${payment.status.name().toLowerCase()}" th:text="${payment.status}"></span></td>
                <td th:text="${payment.paidDate != null ? payment.paidDate : '-'}"></td>
                <td th:text="${payment.transactionId != null ? payment.transactionId : '-'}"></td>
                <td>
                    <form th:if="${payment.status.name() == 'PENDING'}" th:action="@{/student/payment/pay/{id}(id=${payment.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-success btn-sm">Pay Now</button>
                    </form>
                    <span th:if="${payment.status.name() != 'PENDING'}">-</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="7" class="text-center">No payment records found.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
