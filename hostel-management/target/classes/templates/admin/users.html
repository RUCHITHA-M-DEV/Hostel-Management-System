<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">Hostel Management - Admin</div>
    <ul class="navbar-nav">
        <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/admin/users}">Users</a></li>
        <li><a th:href="@{/admin/rooms}">Rooms</a></li>
        <li><a th:href="@{/admin/payments}">Payments</a></li>
        <li>
            <form action="/auth/logout" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<div class="container">
    <h2>User Management</h2>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card mb-4">
        <div class="card-header"><h4>Add Warden</h4></div>
        <div class="card-body">
            <form action="/admin/users/add-warden" method="post" class="form-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="text" name="fullName" class="form-control mr-2" placeholder="Full Name" required/>
                <input type="text" name="username" class="form-control mr-2" placeholder="Username" required/>
                <input type="email" name="email" class="form-control mr-2" placeholder="Email" required/>
                <input type="text" name="phoneNumber" class="form-control mr-2" placeholder="Phone"/>
                <input type="password" name="password" class="form-control mr-2" placeholder="Password" required/>
                <button type="submit" class="btn btn-primary">Add Warden</button>
            </form>
        </div>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td th:text="${user.enabled ? 'Active' : 'Disabled'}"></td>
                <td>
                    <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" th:class="'btn btn-sm ' + (${user.enabled} ? 'btn-warning' : 'btn-success')"
                                th:text="${user.enabled} ? 'Disable' : 'Enable'"></button>
                    </form>
                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete user?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
