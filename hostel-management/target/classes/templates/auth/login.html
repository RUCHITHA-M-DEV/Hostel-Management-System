<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hostel Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .auth-split { display: flex; min-height: 100vh; }
        .auth-image-side {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1555854877-bab0e564b8d5?w=1200&q=80') center/cover no-repeat;
            position: relative;
            display: flex; flex-direction: column;
            justify-content: flex-end; padding: 3rem;
        }
        .auth-image-side::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(15,52,96,0.85) 0%, rgba(15,52,96,0.2) 60%, transparent 100%);
        }
        .auth-image-text { position: relative; z-index: 1; color: #fff; }
        .auth-image-text h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .auth-image-text p  { font-size: 1rem; opacity: 0.85; }
        .auth-form-side {
            width: 460px; min-width: 380px;
            display: flex; align-items: center; justify-content: center;
            background: #f0f2f5; padding: 2rem;
        }
        .auth-card { width: 100%; max-width: 400px; background: #fff; border-radius: 16px; padding: 2.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .auth-card .logo { text-align: center; margin-bottom: 1.8rem; }
        .auth-card .logo i { font-size: 2.5rem; color: #0f3460; }
        .auth-card .logo h2 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-top: 0.4rem; }
        .auth-card .logo p  { color: #8892b0; font-size: 0.88rem; }
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: #8892b0; font-size: 0.9rem; }
        .input-icon .form-control { padding-left: 2.4rem; }
        @media (max-width: 768px) { .auth-image-side { display: none; } .auth-form-side { width: 100%; } }
    </style>
</head>
<body style="margin:0;padding:0;background:#f0f2f5;">
<div class="auth-split">
    <div class="auth-image-side">
        <div class="auth-image-text">
            <h1>Welcome Back</h1>
            <p>Manage your hostel experience — rooms, payments, and complaints all in one place.</p>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-card">
            <div class="logo">
                <i class="fa-solid fa-building-columns"></i>
                <h2>Hostel Management</h2>
                <p>Sign in to your account</p>
            </div>

            <div th:if="${errorMsg}" class="alert alert-danger"><i class="fa fa-circle-exclamation"></i> <span th:text="${errorMsg}"></span></div>
            <div th:if="${logoutMsg}" class="alert alert-success"><i class="fa fa-check-circle"></i> <span th:text="${logoutMsg}"></span></div>
            <div th:if="${successMsg}" class="alert alert-success"><i class="fa fa-check-circle"></i> <span th:text="${successMsg}"></span></div>

            <form action="/auth/login" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-icon">
                        <i class="fa fa-user"></i>
                        <input type="text" name="username" class="form-control" required autofocus placeholder="Enter username"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon">
                        <i class="fa fa-lock"></i>
                        <input type="password" name="password" class="form-control" required placeholder="Enter password"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
                    <i class="fa fa-right-to-bracket" style="margin-right:0.4rem;"></i> Login
                </button>
            </form>
            <p class="text-center mt-3">New student? <a th:href="@{/auth/register}">Register here</a></p>
        </div>
    </div>
</div>
</body>
</html>
