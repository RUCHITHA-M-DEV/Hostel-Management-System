<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaints - Hostel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">Hostel Management</div>
    <ul class="navbar-nav">
        <li><a th:href="@{/student/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/student/rooms}">Rooms</a></li>
        <li><a th:href="@{/student/complaints}">Complaints</a></li>
        <li><a th:href="@{/student/payment}">Payments</a></li>
        <li>
            <form action="/auth/logout" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<div class="container">
    <h2>My Complaints</h2>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card mb-4">
        <div class="card-header"><h4>Submit New Complaint</h4></div>
        <div class="card-body">
            <form action="/student/complaints/submit" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" class="form-control">
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <h4>My Complaints History</h4>
    <table class="table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Status</th>
                <th>Warden Remarks</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="complaint : ${complaints}">
                <td th:text="${complaint.title}"></td>
                <td th:text="${complaint.category}"></td>
                <td><span th:class="'badge badge-' + ${complaint.status.name().toLowerCase()}" th:text="${complaint.status}"></span></td>
                <td th:text="${complaint.wardenRemarks != null ? complaint.wardenRemarks : '-'}"></td>
                <td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(complaints)}">
                <td colspan="5" class="text-center">No complaints submitted yet.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
