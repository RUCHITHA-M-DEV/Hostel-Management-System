<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rooms - Hostel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">Hostel Management</div>
    <ul class="navbar-nav">
        <li><a th:href="@{/student/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/student/rooms}">Rooms</a></li>
        <li><a th:href="@{/student/complaints}">Complaints</a></li>
        <li><a th:href="@{/student/payment}">Payments</a></li>
        <li>
            <form action="/auth/logout" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<div class="container">
    <h2>Available Rooms</h2>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div th:if="${currentAllocation}" class="alert alert-info">
        You are currently allocated to Room <strong th:text="${currentAllocation.room.roomNumber}"></strong>.
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>Room No</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Occupancy</th>
            <th>Price/Year</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="room : ${rooms}">
            <td th:text="${room.roomNumber}"></td>
            <td th:text="${room.roomType}"></td>
            <td th:text="${room.capacity}"></td>
            <td th:text="${room.currentOccupancy}"></td>
            <td th:text="'Rs. ' + ${room.pricePerMonth}"></td>
            <td>
                <form th:if="${currentAllocation == null}" th:action="@{/student/rooms/apply/{id}(id=${room.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-primary btn-sm">Apply</button>
                </form>
                <span th:if="${currentAllocation != null}">-</span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(rooms)}">
            <td colspan="6" class="text-center">No available rooms at the moment.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
